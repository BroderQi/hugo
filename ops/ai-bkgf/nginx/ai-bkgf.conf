server {
    listen 80;
    listen [::]:80;
    server_name ai.bkgf.net;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai.bkgf.net;

    ssl_certificate /etc/nginx/ssl/bkgf.net/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/bkgf.net/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /opt/ai-blog/public;
    index index.html;

    client_max_body_size 10m;
    add_header Referrer-Policy origin always;

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        auth_basic "AI BKGF Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-ai-bkgf;

        proxy_pass http://127.0.0.1:8790/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
