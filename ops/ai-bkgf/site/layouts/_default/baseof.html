<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="/style.css">
  <script src="/search.js" defer></script>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <a class="brand" href="/">一枝AI教程</a>
      <nav>
        <a href="/">首页</a>
        <a href="/news/">文章</a>
        <a href="https://bkgf.net/" target="_blank" rel="noreferrer">会员商城</a>
        <a href="https://aicdk.bkgf.net/" target="_blank" rel="noreferrer">充值中心</a>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="footer">
      <p>持续更新适合简体中文用户的 AI 教程与实战内容</p>
    </footer>
  </div>
</body>
</html>
